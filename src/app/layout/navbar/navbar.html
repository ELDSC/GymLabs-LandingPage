<!-- navbar.component.html -->
<header class="navbar">
  <div class="navbar__contenedor">

    <!-- Logo -->
    <a routerLink="/" class="navbar__logo" (click)="cerrarMenu()">
      GymLabs
    </a>

    <!-- Links desktop -->
    <nav class="navbar__links">
      @for (enlace of enlacesNavegacion; track enlace.path) {
        <a
          [routerLink]="enlace.path"
          routerLinkActive="navbar__link--active"
          [routerLinkActiveOptions]="{ exact: enlace.path === '/' }"
          class="navbar__link">
          {{ enlace.label }}
        </a>
      }
    </nav>

    <!-- Acciones -->
    <div class="navbar__acciones">

      <!-- Dark mode (ícono estático por ahora) -->
      <button class="navbar__icono-btn" aria-label="Cambiar tema">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>

      <!-- Carrito -->
      <button class="navbar__icono-btn" aria-label="Ver carrito">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
        </svg>
      </button>

      <!-- Usuario -->
      <a routerLink="/login" class="navbar__icono-btn" aria-label="Iniciar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </a>

      <!-- Hamburger (solo mobile) -->
      <button
        class="navbar__hamburger"
        [ngClass]="{ 'is-open': menuAbierto() }"
        (click)="alternarMenu()"
        aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </div>

  <!-- Menú móvil -->
  <div class="navbar__mobile" [ngClass]="{ 'is-open': menuAbierto() }">
    @for (enlace of enlacesNavegacion; track enlace.path) {
      <a
        [routerLink]="enlace.path"
        routerLinkActive="navbar__link--active"
        class="navbar__mobile-link"
        (click)="cerrarMenu()">
        {{ enlace.label }}
      </a>
    }
  </div>

</header>
